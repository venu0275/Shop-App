version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: shopverse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopverse
      MYSQL_USER: shopverse
      MYSQL_PASSWORD: shopverse123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shopverse-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: shopverse
      DB_USER: shopverse
      DB_PASSWORD: shopverse123
      JWT_SECRET: local-dev-jwt-secret-key
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: shopverse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
